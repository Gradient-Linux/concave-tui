name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
      - run: go test ./...
      - run: go vet ./...
      - run: CGO_ENABLED=0 go build -o concave-tui ./cmd/concave-tui/
      - run: |
          size=$(stat -c%s concave-tui)
          echo "binary size: ${size} bytes"
          test "$size" -le 25000000
