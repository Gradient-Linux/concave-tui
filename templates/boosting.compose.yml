# Gradient Linux — Boosting Compose Template
# Managed by concave — do not edit manually
# Variables substituted at install time by internal/docker/compose.go
services:
  gradient-boost-core:
    image: python:3.12-slim
    command: ["sleep", "infinity"]
    restart: unless-stopped
    working_dir: /workspace
    volumes:
      - "{{WORKSPACE_ROOT}}/data:/data"
      - "{{WORKSPACE_ROOT}}/notebooks:/notebooks"
      - "{{WORKSPACE_ROOT}}/models:/models"
      - "{{WORKSPACE_ROOT}}/outputs:/outputs"
      - "{{WORKSPACE_ROOT}}/mlruns:/mlruns"
    networks: ["{{COMPOSE_NETWORK}}"]

  gradient-boost-lab:
    image: quay.io/jupyter/base-notebook:python-3.11.6
    restart: unless-stopped
    ports:
      - "8888:8888"
    working_dir: /notebooks
    volumes:
      - "{{WORKSPACE_ROOT}}/data:/data"
      - "{{WORKSPACE_ROOT}}/notebooks:/notebooks"
      - "{{WORKSPACE_ROOT}}/models:/models"
      - "{{WORKSPACE_ROOT}}/outputs:/outputs"
      - "{{WORKSPACE_ROOT}}/mlruns:/mlruns"
    networks: ["{{COMPOSE_NETWORK}}"]

  gradient-boost-track:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    command: ["mlflow", "ui", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "/mlruns"]
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - "{{WORKSPACE_ROOT}}/mlruns:/mlruns"
      - "{{WORKSPACE_ROOT}}/outputs:/outputs"
    networks: ["{{COMPOSE_NETWORK}}"]

networks:
  "{{COMPOSE_NETWORK}}": {}
